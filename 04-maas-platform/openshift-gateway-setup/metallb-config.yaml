apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: maas-pool
  namespace: metallb-system
spec:
  addresses:
    - ${METALLB_IP_RANGE}
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: maas-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
    - maas-pool
